name: skillsbank
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.5.0
  get: ^4.7.2
  get_storage: ^2.1.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  share_plus: ^12.0.0
  json_serializable: ^6.11.1
  flutter_staggered_grid_view: ^0.7.0
  percent_indicator: ^4.2.3
  image_picker: ^1.2.0
  fluttertoast: ^8.2.14
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.0
  connectivity_plus: ^7.0.0
  intl: ^0.20.2
  permission_handler: ^12.0.1
  dropdown_button2: ^2.3.9
  file_picker: ^10.1.1
  collection: ^1.19.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  in_app_update: ^4.2.3
  pinput: ^5.0.2
  sms_autofill: ^2.4.1
  swipe: ^0.0.1
  hexcolor: ^3.0.1
  shimmer: ^3.0.0
  pod_player: ^0.2.2
  flutter_svg: ^2.0.9
  universal_html: ^2.2.4
  flutter_html: ^3.0.0-beta.2
  webview_flutter: ^4.13.0
  logging: ^1.2.0
  video_player: ^2.9.1
  youtube_player_flutter: ^9.1.1
  vimeo_embed_player: ^1.0.2
  flutterwave_standard: ^1.1.0
  font_awesome_flutter: ^10.12.0
  dio: ^5.9.0
  carousel_slider: ^5.1.1
  lottie: ^3.3.2
  liquid_glass_renderer: ^0.2.0-dev.4
  keyboard_actions: "^4.1.0"
  vibration: ^3.1.3




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/mobile_payments/
    - assets/images/card_payments/
    - assets/images/welcome/
    - assets/images/
    - assets/videos/
    - assets/fonts/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Italic-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter/Inter-VariableFont_opsz,wght.ttf
