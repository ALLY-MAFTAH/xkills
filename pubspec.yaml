name: skillsbank
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.5.0
  get: ^4.7.2
  get_storage: ^2.1.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  share_plus: ^12.0.0
  json_serializable: ^6.11.1
  flutter_staggered_grid_view: ^0.7.0
  percent_indicator: ^4.2.3
  image_picker: ^1.2.0
  fluttertoast: ^9.0.0
  url_launcher: ^6.3.2
  flutter_inappwebview: ^6.1.5
  flutter_dotenv: ^6.0.0
  connectivity_plus: ^7.0.0
  intl: ^0.20.2
  permission_handler: ^12.0.1
  dropdown_button2: ^2.3.9
  file_picker: ^10.1.1
  collection: ^1.19.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  pdf: ^3.11.3
  excel: ^4.0.6
  open_file: ^3.5.10
  printing: ^5.14.2
  pie_chart: ^5.4.0
  syncfusion_flutter_charts: ^29.2.7
  in_app_update: ^4.2.3
  pinput: ^5.0.2
  sms_autofill: ^2.4.1
  swipe: ^0.0.1
  hexcolor: ^3.0.1
  shimmer: ^3.0.0
  pod_player: ^0.2.2
  flutter_svg: ^2.0.9
  universal_html: ^2.2.4
  flutter_html: ^3.0.0-beta.2
  webview_flutter: ^4.4.4
  logging: ^1.2.0
  video_player: ^2.9.1
  youtube_player_flutter: ^9.1.1
  vimeo_embed_player: ^1.0.2




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/
    - assets/fonts/
    - assets/icons/
    - .env

  fonts:
    - family: Nunito Sans
      fonts:
        - asset: assets/fonts/NunitoSans-VariableFont_YTLC,opsz,wdth,wght.ttf
        - asset: assets/fonts/NunitoSans-Italic-VariableFont_YTLC,opsz,wdth,wght.ttf

